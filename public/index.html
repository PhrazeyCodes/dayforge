<!DOCTYPE html>
<!-- dayforge v2 - teller integration - 2026-03-07 -->
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DayForge — Daily OS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231c1510'/%3E%3Ctext x='16' y='22' font-family='Georgia%2C serif' font-size='14' font-weight='700' fill='%23e8622a' text-anchor='middle'%3EDF%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf8f3;--surface:#fffcf8;--surface2:#f7f0e6;--surface3:#ede4d6;
  --border:#e8ddd0;--border2:#d6c9b8;
  --accent:#e8622a;--accent2:#f0934a;--gold:#c9920a;
  --green:#1d9e6f;--green2:#24c489;--teal:#0e8fa0;
  --purple:#7657d6;--red:#d63e5a;
  --text:#1c1510;--text2:#6b5d52;--text3:#a8998c;
  --display:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --grd:linear-gradient(135deg,#e8622a,#f0934a,#c9920a);
  --grd-green:linear-gradient(135deg,#1d9e6f,#24c489);
  --grd-blue:linear-gradient(135deg,#0e8fa0,#3bb8cc);
  --grd-purple:linear-gradient(135deg,#7657d6,#a07ee8);
}
html,body{height:100%;background:var(--bg);font-family:var(--sans);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surface2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
.app-shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:#1c1510;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(255,255,255,.04);}
.logo{font-family:var(--display);font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:9px;letter-spacing:-.2px;}
.logo-mark{width:28px;height:28px;background:var(--grd);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:12px;font-weight:800;color:white;}
.tb-sep{width:1px;height:22px;background:rgba(255,255,255,.12);margin:0 4px}
.tb-date{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.45);letter-spacing:.3px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.streak-pill{font-family:var(--mono);font-size:11px;font-weight:600;color:#fff;background:linear-gradient(90deg,rgba(232,98,42,.3),rgba(201,146,10,.25));border:1px solid rgba(232,98,42,.35);border-radius:20px;padding:5px 13px;letter-spacing:.3px;display:flex;align-items:center;gap:5px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green2);box-shadow:0 0 8px var(--green2);animation:pulse-dot 2s ease infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 6px var(--green2)}50%{box-shadow:0 0 14px var(--green2)}}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 14px 20px;display:flex;flex-direction:column;gap:1px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.ns{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;padding:20px 12px 6px;opacity:.6;}
.ni{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:400;color:var(--text2);transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--sans);letter-spacing:.01em;}
.ni:hover{background:var(--surface2);color:var(--text);transform:translateX(2px)}
.ni.active{background:rgba(232,98,42,.08);color:var(--accent);font-weight:600;border-radius:8px;}
.ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;transition:transform .2s;display:flex;align-items:center;justify-content:center;opacity:.7}
.ni-icon svg{width:15px;height:15px;stroke:currentColor}
.ni:hover .ni-icon{transform:scale(1.15)}.ni.active .ni-icon{filter:drop-shadow(0 1px 3px rgba(232,98,42,.4))}
.ndiv{height:1px;background:var(--border);margin:6px 4px;opacity:.6}
.sidebar-footer{margin-top:auto;padding:14px 12px 0;font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.3px}
.sidebar-quote{font-family:var(--display);font-size:10.5px;font-style:italic;color:var(--text3);line-height:1.65;margin-bottom:8px;padding:10px 12px;background:var(--surface2);border-radius:8px;border-left:2px solid rgba(232,98,42,.3);}
.main{padding:0 36px 40px;overflow-y:auto;max-height:calc(100vh - 56px);background:var(--bg)}
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-family:var(--display);font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.cal-sub{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:.3px}
.btn-row{display:flex;align-items:center;gap:6px}
.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,98,42,.05)}
.btn-today{background:transparent;color:var(--accent);border:1px solid rgba(232,98,42,.3);border-radius:8px;padding:6px 14px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;}
.btn-today:hover{border-color:var(--accent);background:rgba(232,98,42,.07)}
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px;margin-bottom:10px;box-shadow:0 1px 4px rgba(28,21,16,.04);}
.wd{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 4px;border-radius:10px;cursor:pointer;transition:all .18s;user-select:none;}
.wd:hover{background:var(--surface2);transform:translateY(-1px)}
.wd.sel{background:linear-gradient(135deg,rgba(232,98,42,.12),rgba(240,147,74,.07));border:1px solid rgba(232,98,42,.25);box-shadow:0 2px 8px rgba(232,98,42,.1)}
.wd.tod:not(.sel){background:rgba(29,158,111,.07);border:1px solid rgba(29,158,111,.2)}
.wd-name{font-family:var(--mono);font-size:8px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.wd.sel .wd-name{color:var(--accent)}.wd.tod:not(.sel) .wd-name{color:var(--green)}
.wd-num{font-family:var(--display);font-size:18px;font-weight:700;color:var(--text2)}
.wd.sel .wd-num{color:var(--accent)}.wd.tod:not(.sel) .wd-num{color:var(--green)}
.wd-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.6}
.mon-grid{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px;display:none;box-shadow:0 2px 12px rgba(28,21,16,.04)}
.mon-grid.open{display:block}
.mon-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mon-label{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.mday-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.mday-lbl{text-align:center;font-family:var(--mono);font-size:9px;font-weight:600;color:var(--text3);padding:3px 0;letter-spacing:.5px}
.mdays{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.md{text-align:center;padding:7px 2px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:12px;transition:all .12s;user-select:none;color:var(--text2)}
.md:hover{background:var(--surface2)}.md.sel{background:rgba(232,98,42,.1);color:var(--accent);font-weight:700}.md.tod:not(.sel){color:var(--green);font-weight:700}
.mdot{width:3px;height:3px;border-radius:50%;background:var(--accent);margin:2px auto 0;opacity:.5}
.mon-toggle{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--text3);font-weight:500;transition:all .15s;letter-spacing:.3px;}
.mon-toggle:hover{border-color:var(--border2);color:var(--text2)}
.stabs{display:none;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{padding:7px 16px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;font-family:var(--sans);font-size:12px;font-weight:500;white-space:nowrap;transition:all .18s;flex-shrink:0;user-select:none;}
.stab.on{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 3px 12px rgba(232,98,42,.3)}
.stab.off{background:var(--surface);color:var(--text3);border-color:var(--border)}
.stab.off:hover{color:var(--text2);border-color:var(--border2);background:var(--surface2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;transition:box-shadow .2s,border-color .2s,transform .2s;box-shadow:0 1px 4px rgba(28,21,16,.05);}
.card:hover{border-color:var(--border2);box-shadow:0 4px 20px rgba(28,21,16,.08);transform:translateY(-1px)}
.card-hero{background:linear-gradient(135deg,#fffcf8,#fdf4e8);border-color:rgba(232,98,42,.15);}
.card-hero:hover{border-color:rgba(232,98,42,.3)}
.ch{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ch-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cicon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.cicon svg{width:17px;height:17px}
.ctitle{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.csub{font-family:var(--sans);font-size:11px;color:var(--text3);margin-top:2px;font-weight:400}
.flabel{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text3);margin-bottom:6px;margin-top:14px;display:block;letter-spacing:.6px;text-transform:uppercase}
.flabel:first-child{margin-top:0}
textarea,input[type=text]{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface2);resize:none;outline:none;transition:all .2s;line-height:1.65;}
textarea:focus,input[type=text]:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(232,98,42,.08)}
textarea::placeholder,input[type=text]::placeholder{color:var(--text3)}
.btn{border:none;border-radius:10px;padding:10px 18px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px;}
.btn-primary{background:var(--grd);color:white;width:100%;justify-content:center;margin-top:14px;box-shadow:0 4px 14px rgba(232,98,42,.3);}
.btn-primary:hover{box-shadow:0 6px 20px rgba(232,98,42,.45);transform:translateY(-1px)}
.btn-purple{background:var(--grd-purple);color:white;width:100%;justify-content:center;margin-top:14px;box-shadow:0 4px 14px rgba(118,87,214,.3);}
.btn-purple:hover{box-shadow:0 6px 20px rgba(118,87,214,.45);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text3);border:1.5px solid var(--border);width:100%;justify-content:center;margin-top:10px;border-radius:10px;font-family:var(--sans);font-size:12px;font-weight:500;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:rgba(232,98,42,.04)}
.btn-sm{padding:6px 12px;font-size:11px;border-radius:8px;font-family:var(--sans);font-weight:600}
.btn-green{background:rgba(29,158,111,.09);color:var(--green);border:1px solid rgba(29,158,111,.2)}
.btn-green:hover{background:rgba(29,158,111,.15)}
.btn-red{background:rgba(214,62,90,.06);color:var(--red);border:none;padding:4px 9px;border-radius:6px;font-family:var(--mono);font-size:10px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-red:hover{background:rgba(214,62,90,.13)}
.stars{display:flex;gap:5px;margin-bottom:6px}
.star{font-size:22px;cursor:pointer;color:var(--border2);transition:all .15s;user-select:none;line-height:1}
.star:hover{transform:scale(1.2)}.star.on{color:var(--gold);filter:drop-shadow(0 1px 4px rgba(201,146,10,.4))}
.pbar{background:var(--surface2);border-radius:6px;height:6px;overflow:hidden;margin-bottom:14px}
.pbar-fill{height:100%;border-radius:6px;background:var(--grd);transition:width .6s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 6px rgba(232,98,42,.3)}
.goal-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);}
.goal-item:last-of-type{border-bottom:none}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:11px;color:transparent;}
.chk.done{background:var(--grd-green);border-color:var(--green);color:white;box-shadow:0 2px 8px rgba(29,158,111,.3)}
.goal-txt{flex:1;font-size:13px;transition:all .2s;color:var(--text);font-weight:500}
.goal-txt.done{color:var(--text3);text-decoration:line-through;font-weight:400}
.tag{font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 8px;border-radius:10px;flex-shrink:0;letter-spacing:.3px}
.add-row{display:flex;gap:8px;margin-top:14px;align-items:center}
.add-input{border:1.5px solid var(--border);border-radius:10px;padding:8px 13px;font-family:var(--sans);font-size:13px;flex:1;outline:none;background:var(--surface2);color:var(--text);transition:all .2s;height:38px;}
.add-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(232,98,42,.08)}
.add-input::placeholder{color:var(--text3)}
.add-btn{background:var(--grd);color:white;border:none;border-radius:10px;width:38px;height:38px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-weight:700;box-shadow:0 2px 8px rgba(232,98,42,.3);}
.add-btn:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(232,98,42,.4)}
.tag-select{border:1.5px solid var(--border);border-radius:10px;padding:0 11px;height:38px;font-family:var(--mono);font-size:11px;background:var(--surface2);color:var(--text2);outline:none;cursor:pointer;flex-shrink:0;}
.rings{display:flex;gap:16px;justify-content:center;margin:14px 0 4px}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:5px}
.ring-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.ring-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.cbar{background:var(--surface2);border-radius:6px;height:6px;overflow:hidden;margin-bottom:5px}
.cbar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--red),var(--accent),var(--gold));transition:width .7s ease;box-shadow:0 1px 5px rgba(232,98,42,.25)}
.cbar-lbls{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:14px;letter-spacing:.2px}
.meal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.meal-row:last-of-type{border-bottom:none}
.meal-name{font-size:13px;font-weight:600;color:var(--text)}
.meal-sub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.mtags{display:flex;gap:5px;align-items:center}
.mtag{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 7px;border-radius:8px;letter-spacing:.2px}
.streak-card{background:linear-gradient(135deg,#1c1510 0%,#2d1f14 60%,#3a2e1a 100%);border:none;border-radius:20px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(28,21,16,.2);}
.streak-card::before{content:'';position:absolute;top:-30px;right:-30px;width:200px;height:200px;background:radial-gradient(circle,rgba(232,98,42,.25),transparent 70%);pointer-events:none;}
.streak-card::after{content:'';position:absolute;bottom:-20px;left:60px;width:150px;height:150px;background:radial-gradient(circle,rgba(201,146,10,.15),transparent 70%);pointer-events:none;}
.streak-num{font-family:var(--display);font-size:56px;font-weight:800;line-height:1;color:#fff}
.heatmap{display:flex;flex-wrap:wrap;gap:3px;margin-top:14px}
.hcell{width:14px;height:14px;border-radius:3px}
.scard{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;transition:all .2s;}
.scard:hover{border-color:var(--border2);box-shadow:0 3px 12px rgba(28,21,16,.06)}
.scard-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;gap:8px}
.sname{font-size:13px;font-weight:600;color:var(--text)}
.ssub{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.2px}
.showed-btn{border:1.5px solid var(--border);border-radius:8px;padding:5px 11px;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:600;transition:all .2s;flex-shrink:0;white-space:nowrap;background:transparent;}
.showed-btn.on{background:rgba(29,158,111,.08);color:var(--green);border-color:rgba(29,158,111,.25);box-shadow:0 1px 6px rgba(29,158,111,.15)}
.showed-btn.off{color:var(--text3)}.showed-btn.off:hover{color:var(--text2);border-color:var(--border2)}
.add-form{background:var(--surface2);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.type-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.type-btn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;font-family:var(--sans);font-size:11px;font-weight:600;transition:all .18s;user-select:none;background:transparent;}
.type-btn.on{background:var(--accent);color:white;border-color:var(--accent);box-shadow:0 2px 8px rgba(232,98,42,.3)}
.type-btn.off{color:var(--text3)}.type-btn.off:hover{color:var(--text2);border-color:var(--border2)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 16px;text-align:left;transition:box-shadow .2s,transform .2s;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(28,21,16,.05);}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(28,21,16,.08)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 16px 0 60px;opacity:.07;}
.stat-card:nth-child(1)::after{background:var(--green)}
.stat-card:nth-child(2)::after{background:var(--accent)}
.stat-card:nth-child(3)::after{background:var(--gold)}
.stat-card:nth-child(4)::after{background:var(--purple)}
.stat-val{font-family:var(--display);font-size:26px;font-weight:700;color:var(--text)}
.stat-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.9px}
.stat-icon{font-size:20px;margin-bottom:6px;display:flex;justify-content:center;opacity:.7}
.stat-icon svg{width:20px;height:20px}
.overlay{position:fixed;inset:0;background:rgba(28,21,16,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:440px;max-width:93vw;box-shadow:0 20px 60px rgba(28,21,16,.18);max-height:90vh;overflow-y:auto;}
.modal-title{font-family:var(--display);font-size:20px;font-weight:700;color:var(--text);margin-bottom:5px;letter-spacing:-.3px}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:18px;line-height:1.7}

<script>
// ── Teller configuration ──────────────────────────────────────────────────
// Paste your Teller Application ID from teller.io/dashboard below
window.TELLER_APP_ID = 'app_ppipmb4b14vs8gibjc000';
window.TELLER_ENV   = 'production';
// ─────────────────────────────────────────────────────────────────────────
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var QUOTES=[
  {q:"The secret of getting ahead is getting started.",a:"Mark Twain"},
  {q:"Small daily improvements are the key to staggering long-term results.",a:"Robin Sharma"},
  {q:"Discipline is choosing between what you want now and what you want most.",a:"Abraham Lincoln"},
  {q:"You don't have to be great to start, but you have to start to be great.",a:"Zig Ziglar"},
  {q:"The only bad workout is the one that didn't happen.",a:"Unknown"},
  {q:"Take care of your body. It's the only place you have to live.",a:"Jim Rohn"},
  {q:"Action is the foundational key to all success.",a:"Pablo Picasso"},
  {q:"Your future self is watching you right now through your memories.",a:"Aubrey de Grey"},
  {q:"Every day is a new beginning. Take a deep breath and start again.",a:"Unknown"},
  {q:"The groundwork of all happiness is health.",a:"Leigh Hunt"},
  {q:"Success is the sum of small efforts repeated day in and day out.",a:"Robert Collier"},
  {q:"Strive not to be a success, but rather to be of value.",a:"Albert Einstein"},
];
var DOT_DAYS=[3,7,10,14,17,21,24,28];
var TAG_COLORS={Health:'#1a9e6e',Work:'#2a6af0',Personal:'#c47d0a',Fitness:'#5b4ecf',Other:'#9a9590'};
var today=new Date(),selDate=new Date(),weekOff=0,monOff=0,monOpen=false,activeTab='dashboard',scanStep=0,addMealCat='Lunch';
var scanImageBase64=null,scanImageType='image/jpeg',scanDetected=[],scanMealCat='Lunch';

// ── DEFAULT (empty) state ──
var DEFAULT_S={
  streak:0,
  mj:{intention:'',gratitude:'',priorities:'',savedAt:''},
  nj:{wentWell:'',better:'',learned:'',rating:0,savedAt:''},
  goals:[],       // legacy — migrated on load
  goalsByDate:{}, // keyed by 'YYYY-MM-DD'
  meals:[],
  macGoals:{protein:160,carbs:220,fat:70,calories:2000},
  sessions:[],
  sessionsByDate:{}, // keyed by 'YYYY-MM-DD'
  showAddSession:false,
  sessionType:'Lifting',
  expenses:[],
  budgets:{Housing:0,Food:0,Transport:0,Shopping:0,Health:0,Entertainment:0,Other:0},
  monthlyIncome:0,
  finTab:'log',
  lastImport:null,
  healthByDate:{},  // keyed by 'YYYY-MM-DD': {burned:0,steps:0,activeMin:0,source:'manual'}
  strava:null,      // {access_token, refresh_token, expires_at, athlete_name} or null
};

// ── Load / Save via localStorage ──
var LS_KEY='dayforge_v1';
function dateKey(d){var m=d.getMonth()+1,day=d.getDate();return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day;}
function goalsForDate(d){return (S.goalsByDate&&S.goalsByDate[dateKey(d)])||[];}
function sessionsForDate(d){return (S.sessionsByDate&&S.sessionsByDate[dateKey(d)])||[];}
function allSessions(){var all=[];Object.values(S.sessionsByDate||{}).forEach(function(arr){all=all.concat(arr||[]);});return all;}
function healthForDate(d){return (S.healthByDate&&S.healthByDate[dateKey(d)])||{burned:0,steps:0,activeMin:0,source:''};}
function healthForToday(){return healthForDate(today);}
function netCalories(){var t=macTotals();var h=healthForDate(selDate);return t.cal-(h.burned||0);}

// ── SVG Mini Chart builders ──
function svgBarChart(data,labels,colors,h,unit){
  h=h||120;var w=300,pad=32,barW,max=Math.max.apply(null,data.concat([1]));
  var n=data.length;barW=Math.max(8,Math.floor((w-pad*2-n*4)/n));
  var bars=data.map(function(v,i){
    var bh=Math.round((v/max)*(h-36));var x=pad+(i*(barW+6));var y=h-20-bh;
    var col=Array.isArray(colors)?colors[i%colors.length]:colors;
    return '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+bh+'" rx="4" fill="'+col+'" opacity="0.85"/>'
      +'<text x="'+(x+barW/2)+'" y="'+(h-4)+'" text-anchor="middle" class="chart-axis" font-size="9">'+esc(labels[i]||'')+'</text>'
      +(v>0?'<text x="'+(x+barW/2)+'" y="'+(y-4)+'" text-anchor="middle" class="chart-axis" font-size="9">'+(unit?v+unit:v)+'</text>':'');
  }).join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" class="chart-svg">'+bars+'</svg>';
}
function svgLineChart(datasets,labels,h){
  h=h||120;var w=300,pad=36,allVals=[];
  datasets.forEach(function(ds){allVals=allVals.concat(ds.data);});
  var max=Math.max.apply(null,allVals.concat([1])),n=labels.length;
  var xStep=(w-pad*2)/(Math.max(n-1,1));
  var grids='';
  for(var g=0;g<=4;g++){var gy=Math.round(20+(h-40)*g/4);grids+='<line x1="'+pad+'" y1="'+gy+'" x2="'+(w-10)+'" y2="'+gy+'" class="chart-grid"/>';}
  var paths=datasets.map(function(ds){
    var pts=ds.data.map(function(v,i){var x=pad+i*xStep;var y=20+(h-40)*(1-v/max);return x+','+y;});
    var d='M'+pts.join(' L');
    var dots=ds.data.map(function(v,i){var x=pad+i*xStep;var y=20+(h-40)*(1-v/max);return '<circle cx="'+x+'" cy="'+y+'" r="3" fill="'+ds.color+'"/>';}).join('');
    return '<path d="'+d+'" class="chart-line" stroke="'+ds.color+'"/>'+dots;
  }).join('');
  var xlbls=labels.map(function(l,i){return '<text x="'+(pad+i*xStep)+'" y="'+(h-2)+'" text-anchor="middle" class="chart-axis" font-size="9">'+esc(l)+'</text>';}).join('');
  return '<svg viewBox="0 0 '+w+' '+h+'" class="chart-svg">'+grids+paths+xlbls+'</svg>';
}
function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw) return JSON.parse(JSON.stringify(DEFAULT_S));
    var saved=JSON.parse(raw);
    var s=Object.assign(JSON.parse(JSON.stringify(DEFAULT_S)),saved);
    // ── Migrate legacy flat goals → today's date bucket ──
    if(s.goals&&s.goals.length&&!Object.keys(s.goalsByDate||{}).length){
      var tk=dateKey(new Date());
      s.goalsByDate=s.goalsByDate||{};
      s.goalsByDate[tk]=s.goals;
    }
    s.goals=[];
    // ── Migrate legacy sessions → date buckets ──
    if(s.sessions&&s.sessions.length&&!Object.keys(s.sessionsByDate||{}).length){
      var tk2=dateKey(new Date());
      s.sessionsByDate=s.sessionsByDate||{};
      s.sessionsByDate[tk2]=s.sessions;
    }
    s.sessions=[];
    return s;
  }catch(e){return JSON.parse(JSON.stringify(DEFAULT_S));}
}
function saveState(){
  try{
    var copy=Object.assign({},S);
    copy.showAddSession=false; // don't persist open form
    localStorage.setItem(LS_KEY,JSON.stringify(copy));
  }catch(e){}
}

var S=loadState();

function sameDay(a,b){return a.getDate()===b.getDate()&&a.getMonth()===b.getMonth()&&a.getFullYear()===b.getFullYear();}
function pct(v,g){return Math.min(100,Math.round(v/g*100));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function macTotals(){return S.meals.reduce(function(a,m){return{p:a.p+m.p,c:a.c+m.c,f:a.f+m.f,cal:a.cal+m.cal};},{p:0,c:0,f:0,cal:0});}
function tagStyle(tag){var c=TAG_COLORS[tag]||'#9a9590';return 'background:'+c+'14;color:'+c+';border:1px solid '+c+'28';}
function showToast(msg){var t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

function ring(val,goal,color,sz){
  sz=sz||60;var r=(sz-7)/2,circ=2*Math.PI*r,p=Math.min(1,val/goal);
  return '<svg width="'+sz+'" height="'+sz+'" style="transform:rotate(-90deg)">'
    +'<circle cx="'+(sz/2)+'" cy="'+(sz/2)+'" r="'+r+'" fill="none" stroke="#e8e5df" stroke-width="5"/>'
    +'<circle cx="'+(sz/2)+'" cy="'+(sz/2)+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="5"'
    +' stroke-dasharray="'+circ.toFixed(2)+'" stroke-dashoffset="'+(circ*(1-p)).toFixed(2)+'" stroke-linecap="round"/>'
    +'</svg>';
}
function ringsHTML(t,sz){
  var items=[{v:t.p,g:S.macGoals.protein,c:'#2a6af0',l:'Protein'},{v:t.c,g:S.macGoals.carbs,c:'#c47d0a',l:'Carbs'},{v:t.f,g:S.macGoals.fat,c:'#d94060',l:'Fat'}];
  return items.map(function(it){return '<div class="ring-item">'+ring(it.v,it.g,it.c,sz||60)+'<div class="ring-val">'+it.v+'g</div><div class="ring-lbl">'+it.l+'</div></div>';}).join('');
}

function init(){
  document.getElementById('tb-date').textContent=today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('tb-streak').textContent=S.streak;
  var q=QUOTES[today.getDate()%QUOTES.length];
  var sq=document.getElementById('sidebar-quote');
  if(sq) sq.innerHTML='"'+q.q+'"<div style="margin-top:4px;font-family:var(--mono);font-size:9px;color:var(--text3);font-style:normal;letter-spacing:.4px">— '+q.a+'</div>';
  document.querySelectorAll('[data-tab]').forEach(function(btn){btn.addEventListener('click',function(){setTab(btn.getAttribute('data-tab'));});});
  document.getElementById('wprev').addEventListener('click',function(){weekOff--;renderCal();});
  document.getElementById('wnext').addEventListener('click',function(){weekOff++;renderCal();});
  document.getElementById('goto-today').addEventListener('click',gotoToday);
  document.getElementById('mon-toggle').addEventListener('click',toggleMon);
  document.getElementById('mprev').addEventListener('click',function(){monOff--;renderMonGrid();});
  document.getElementById('mnext').addEventListener('click',function(){monOff++;renderMonGrid();});
  renderCal();renderTab();
  // Handle iOS Shortcut deep-link: #health?burned=450&steps=8200&date=2026-03-07
  (function(){
    var hash=window.location.hash;
    if(hash&&hash.startsWith('#health?')){
      try{
        var params=new URLSearchParams(hash.slice('#health?'.length));
        var burned=parseInt(params.get('burned'))||0;
        var steps=parseInt(params.get('steps'))||0;
        var activeMin=parseInt(params.get('active'))||0;
        var date=params.get('date')||dateKey(today);
        if(!S.healthByDate) S.healthByDate={};
        S.healthByDate[date]={burned:burned,steps:steps,activeMin:activeMin,source:'Apple Health – '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})};
        saveState();
        window.location.hash='';
        showToast('Apple Health synced ✓');
        renderTab();
      }catch(e){}
    }
  })();
  // Handle Strava OAuth callback: ?code=...&scope=...
  (function(){
    var params=new URLSearchParams(window.location.search);
    var code=params.get('code');
    var scope=params.get('scope')||'';
    if(code&&scope.includes('activity:read')){
      window.history.replaceState({},'',window.location.pathname);
      showToast('Connecting Strava…');
      fetch('/api/strava-auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'exchange',code:code})})
        .then(function(r){return r.json();})
        .then(function(data){
          if(data.error) throw new Error(data.error);
          S.strava={access_token:data.access_token,refresh_token:data.refresh_token,expires_at:data.expires_at,athlete_name:data.athlete_name};
          saveState();
          showToast('Strava connected ✓');
          stravaSync(true);
        })
        .catch(function(e){showToast('Strava error: '+e.message);});
    }
  })();
  // Auto-sync Strava on page load if connected
  if(S.strava&&S.strava.refresh_token) stravaSync(false);
}

// ── Strava sync ───────────────────────────────────────────────────────────────
function stravaSync(showActivity){
  if(!S.strava||!S.strava.refresh_token) return;
  if(showActivity) showToast('Syncing Strava…');
  var btn=document.getElementById('strava-sync-btn');
  if(btn){btn.disabled=true;btn.textContent='syncing…';}
  fetch('/api/strava-auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    action:'sync',
    access_token:S.strava.access_token,
    refresh_token:S.strava.refresh_token,
    expires_at:S.strava.expires_at,
  })})
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error) throw new Error(data.error);
    S.strava.access_token=data.access_token;
    S.strava.refresh_token=data.refresh_token;
    S.strava.expires_at=data.expires_at;
    var dk=dateKey(today);
    if(!S.healthByDate) S.healthByDate={};
    var existing=S.healthByDate[dk]||{};
    S.healthByDate[dk]=Object.assign({},existing,{
      burned:data.calories,
      source:'Strava – '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),
      stravaActivities:data.activities,
    });
    saveState();
    if(showActivity) showToast('Strava synced ✓ '+data.calories+' kcal burned');
    renderTab();
  })
  .catch(function(e){
    showToast('Strava sync failed: '+e.message);
    var btn2=document.getElementById('strava-sync-btn');
    if(btn2){btn2.disabled=false;btn2.textContent='↻ Sync Now';}
  });
}

function setTab(tab){
  activeTab=tab;
  document.querySelectorAll('.ni').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-tab')===tab);});
  document.querySelectorAll('.stab').forEach(function(el){el.className='stab '+(el.getAttribute('data-tab')===tab?'on':'off');});
  document.querySelectorAll('.bn-item').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-tab')===tab);});
  renderTab();
}

function renderTab(){
  var el=document.getElementById('content');el.className='fade-in';void el.offsetWidth;
  // Hide the top calendar section on dashboard (it has its own inline week strip)
  var calSection=document.getElementById('cal-section');
  if(calSection) calSection.style.display=activeTab==='dashboard'?'none':'';
  if(activeTab==='dashboard') el.innerHTML=tplDashboard();
  else if(activeTab==='morning') el.innerHTML=tplMorning();
  else if(activeTab==='evening') el.innerHTML=tplEvening();
  else if(activeTab==='goals') el.innerHTML=tplGoals();
  else if(activeTab==='nutrition') el.innerHTML=tplNutrition();
  else if(activeTab==='fitness') el.innerHTML=tplFitness();
  else if(activeTab==='finance') el.innerHTML=tplFinance();
  bindContent();
  // Re-populate inline week strip on dashboard after DOM is ready
  if(activeTab==='dashboard') renderCal();
}

function renderCal(){
  var base=new Date(today);base.setDate(base.getDate()+weekOff*7);
  var ws=new Date(base);ws.setDate(base.getDate()-base.getDay());
  document.getElementById('cal-title').textContent=MONTHS[selDate.getMonth()]+' '+selDate.getFullYear();
  document.getElementById('cal-sub').textContent=selDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  var strip=document.getElementById('week-strip');strip.innerHTML='';
  for(var i=0;i<7;i++){
    var d=new Date(ws);d.setDate(ws.getDate()+i);
    var isTod=sameDay(d,today),isSel=sameDay(d,selDate);
    var div=document.createElement('div');
    div.className='wd'+(isSel?' sel':isTod?' tod':'');
    var hasDot=[1,3,5].indexOf(i)>-1;
    div.innerHTML='<span class="wd-name">'+DAYS[d.getDay()]+'</span><span class="wd-num">'+d.getDate()+'</span>'+(hasDot?'<div class="wd-dot"></div>':'<div style="height:3px"></div>');
    (function(dd){div.addEventListener('click',function(){selDate=new Date(dd);renderCal();renderTab();});})(d);
    strip.appendChild(div);
  }
  // Also populate inline dashboard week strip if present
  var inlineStrip=document.getElementById('df-week-strip');
  if(inlineStrip){
    inlineStrip.innerHTML='';
    for(var j=0;j<7;j++){
      var d2=new Date(ws);d2.setDate(ws.getDate()+j);
      var isTod2=sameDay(d2,today),isSel2=sameDay(d2,selDate);
      var div2=document.createElement('div');
      div2.className='wd'+(isSel2?' sel':isTod2?' tod':'');
      div2.innerHTML='<span class="wd-name">'+DAYS[d2.getDay()]+'</span><span class="wd-num">'+d2.getDate()+'</span><div style="height:3px"></div>';
      (function(dd2){div2.addEventListener('click',function(){selDate=new Date(dd2);renderCal();renderTab();});})(d2);
      inlineStrip.appendChild(div2);
    }
  }
  renderMonGrid();
}
function renderMonGrid(){
  var base=new Date(today.getFullYear(),today.getMonth()+monOff,1);
  document.getElementById('mon-label').textContent=MONTHS[base.getMonth()]+' '+base.getFullYear();
  var hdrs=document.getElementById('mday-hdrs');
  hdrs.innerHTML=DAYS.map(function(d){return '<div class="mday-lbl">'+d[0]+'</div>';}).join('');
  var dim=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  var fd=new Date(base.getFullYear(),base.getMonth(),1).getDay();
  var grid=document.getElementById('mdays');grid.innerHTML='';
  for(var i=0;i<fd;i++){grid.appendChild(document.createElement('div'));}
  for(var day=1;day<=dim;day++){
    var dd=new Date(base.getFullYear(),base.getMonth(),day);
    var isSel=sameDay(dd,selDate),isTod=sameDay(dd,today),hasDot=DOT_DAYS.indexOf(day)>-1;
    var div=document.createElement('div');
    div.className='md'+(isSel?' sel':isTod?' tod':'');
    div.innerHTML=day+(hasDot?'<div class="mdot"></div>':'');
    (function(ddd){div.addEventListener('click',function(){selDate=new Date(ddd);renderCal();renderTab();});})(dd);
    grid.appendChild(div);
  }
}

  +(typeEntries.length?'<div class="card"><div class="ch"><div class="cicon" style="background:linear-gradient(135deg,rgba(118,87,214,.12),rgba(160,126,232,.08))"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="15" r="6"/><path d="M8.56 2.9A7 7 0 0 1 19 9v1"/><path d="M5 9v1a7 7 0 0 0 5.44 6.1"/><line x1="12" y1="9" x2="12" y2="9"/></svg></div><div><div class="ctitle">Activity Breakdown</div><div class="csub">all-time by type</div></div></div>'
  +'<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">'
  +typeEntries.map(function(e){var pct2=Math.round(e[1]/allS.length*100);return '<div class="cat-bar-row"><div class="cat-bar-label" style="color:'+typeColors[e[0]]+'">'+e[0]+'</div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:'+pct2+'%;background:'+typeColors[e[0]]+'"></div></div><div class="cat-bar-val">'+e[1]+' sess</div></div>';}).join('')
  +'</div></div>':'')

  +'<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
  +'<div style="display:flex;align-items:center;gap:10px">'
  +'<div class="cicon" style="background:linear-gradient(135deg,rgba(118,87,214,.12),rgba(160,126,232,.08))"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M3 12h18"/><rect x="2" y="5" width="3" height="14" rx="1.5"/><rect x="19" y="5" width="3" height="14" rx="1.5"/></svg></div>'
  +'<div><div class="ctitle">Sessions</div>'
  +'<div style="display:flex;align-items:center;gap:6px;margin-top:2px">'
  +'<span style="background:'+(isToday?'rgba(29,158,111,.1)':isFuture?'rgba(14,143,160,.1)':'rgba(168,153,140,.1)')+';color:'+(isToday?'var(--green)':isFuture?'var(--teal)':'var(--text3)')+';font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px">'+dateLabel+'</span>'
  +daySessions.length+' session'+(daySessions.length!==1?'s':'')+'</div></div></div>'
  +'<div style="display:flex;gap:8px;align-items:center">'
  +(S.streak===0?'<button class="btn btn-sm btn-green" id="inc-streak">+streak</button>':'')
  +'<button class="btn btn-sm" style="background:rgba(232,98,42,.08);color:var(--accent);border:1px solid rgba(232,98,42,.2)" id="toggle-add">+ session</button>'
  +'</div></div>'
  +formHTML+sCards+'</div></div>';
}

// ── FINANCE ──
var EXP_CATS=['Housing','Food','Transport','Shopping','Health','Entertainment','Other'];
var EXP_CAT_COLORS={Housing:'#5b4ecf',Food:'#c47d0a',Transport:'#2a6af0',Shopping:'#d94060',Health:'#1a9e6e',Entertainment:'#9b6bcc',Other:'#9a9590'};
function fmtMoney(n){return '$'+parseFloat(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtMoneyShort(n){n=parseFloat(n||0);if(n>=1000)return '$'+(n/1000).toFixed(1)+'k';return '$'+n.toFixed(0);}

function tplFinance(){
  var now=new Date(),curMonth=now.getMonth(),curYear=now.getFullYear();
  var allExp=S.expenses.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var monthExps=S.expenses.filter(function(e){var d=new Date(e.date);return d.getMonth()===curMonth&&d.getFullYear()===curYear;});
  var monthSpend=monthExps.filter(function(e){return e.type!=='income';}).reduce(function(a,e){return a+e.amount;},0);
  var monthIncome=monthExps.filter(function(e){return e.type==='income';}).reduce(function(a,e){return a+e.amount;},0)+(parseFloat(S.monthlyIncome)||0);
  var totalBudget=Object.values(S.budgets).reduce(function(a,v){return a+(parseFloat(v)||0);},0);
  var net=monthIncome-monthSpend;
  var finTab=S.finTab||'log';

  // category spend totals this month
  var catTotals={};
  EXP_CATS.forEach(function(c){catTotals[c]=0;});
  monthExps.filter(function(e){return e.type!=='income';}).forEach(function(e){catTotals[e.cat]=(catTotals[e.cat]||0)+e.amount;});
  var maxCat=Math.max.apply(null,Object.values(catTotals).concat([1]));

  // ── 6-month spending & income trend ──
  var trendLabels=[],trendSpend=[],trendIncome=[],trendSave=[];
  for(var ti=5;ti>=0;ti--){
    var tm=new Date(curYear,curMonth-ti,1);
    var tExps=S.expenses.filter(function(e){var d=new Date(e.date);return d.getMonth()===tm.getMonth()&&d.getFullYear()===tm.getFullYear();});
    var tSpend=tExps.filter(function(e){return e.type!=='income';}).reduce(function(a,e){return a+e.amount;},0);
    var tInc=tExps.filter(function(e){return e.type==='income';}).reduce(function(a,e){return a+e.amount;},0)+(ti===0?parseFloat(S.monthlyIncome)||0:0);
    trendLabels.push(MONTHS[tm.getMonth()].slice(0,3));
    trendSpend.push(Math.round(tSpend));
    trendIncome.push(Math.round(tInc));
    trendSave.push(Math.max(0,Math.round(tInc-tSpend)));
  }
  var trendChart=svgLineChart([
    {data:trendSpend,color:'var(--red)'},
    {data:trendIncome,color:'var(--green)'}
  ],trendLabels,110);
  var savingsChart=svgBarChart(trendSave,trendLabels,'var(--teal)',90);

  // ── Daily spend this month (sparkline bars) ──
  var daysInMon=new Date(curYear,curMonth+1,0).getDate();
  var dailyData=[];
  for(var di=1;di<=Math.min(daysInMon,now.getDate());di++){
    var dk2=curYear+'-'+(curMonth+1<10?'0':'')+(curMonth+1)+'-'+(di<10?'0':'')+di;
    var daySpend=S.expenses.filter(function(e){return e.date===dk2&&e.type!=='income';}).reduce(function(a,e){return a+e.amount;},0);
    dailyData.push(Math.round(daySpend));
  }
  var dailyLabels=dailyData.map(function(_,i){return i+1===1||i+1===now.getDate()||((i+1)%7===0)?String(i+1):'';});
  var dailyChart=svgBarChart(dailyData,dailyLabels,'var(--accent)',80);

  var tabBtns=['log','breakdown','trends','budget','insights'].map(function(t){
    return '<button class="fin-tab-btn'+(finTab===t?' on':'')+'" data-fin-tab="'+t+'">'+t+'</button>';
  }).join('');

  // ── Shared calendar vars used in budget pace bar + insights ──
  var daysInMonth2=new Date(curYear,curMonth+1,0).getDate();
  var expectedPct=now.getDate()/daysInMonth2;

  // ── Savings rate progress ring ──
  var savePct=monthIncome>0?Math.round(Math.max(0,net)/monthIncome*100):0;
  var savRing=ring(Math.max(0,net),Math.max(monthIncome,1),'var(--green)',56);

  var statsHTML='<div class="fin-stats">'
    +'<div class="fin-stat"><div class="fin-stat-val">'+fmtMoney(monthSpend)+'</div><div class="fin-stat-lbl">Spent this month</div>'
    +(totalBudget>0?'<div class="fin-stat-sub" style="color:'+(monthSpend>totalBudget?'var(--red)':'var(--green)')+'">'+Math.round(monthSpend/totalBudget*100)+'% of budget</div>':'')+'</div>'
    +'<div class="fin-stat"><div class="fin-stat-val" style="color:var(--green)">'+fmtMoney(monthIncome)+'</div><div class="fin-stat-lbl">Income this month</div></div>'
    +'<div class="fin-stat" style="display:flex;align-items:center;gap:10px">'
    +'<div>'+savRing+'</div>'
    +'<div><div class="fin-stat-val" style="color:'+(net>=0?'var(--green)':'var(--red)')+'">'+savePct+'%</div><div class="fin-stat-lbl">Savings rate</div></div></div>'
    +'</div>';

  var content='';
  if(finTab==='log'){
    var daySpendBars=dailyData.some(function(v){return v>0;})?'<div class="card" style="margin-bottom:12px"><div class="ch"><div class="cicon" style="background:linear-gradient(135deg,rgba(232,98,42,.1),rgba(201,146,10,.07))"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="ctitle">Daily Spending</div><div class="csub">'+MONTHS[curMonth]+' — day by day</div></div></div><div class="chart-wrap" style="margin-top:6px">'+dailyChart+'</div></div>':'';
    if(!allExp.length){
      content=daySpendBars+'<div class="empty"><div class="empty-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><div class="empty-txt">No transactions yet.<br>Tap "+ add transaction" to get started.</div></div>';
    } else {
      var groups={};
      allExp.forEach(function(e){if(!groups[e.date])groups[e.date]=[];groups[e.date].push(e);});
      var rows=Object.keys(groups).sort(function(a,b){return b.localeCompare(a);}).slice(0,40).map(function(date){
        var d=new Date(date+'T00:00:00');
        var label=sameDay(d,now)?'Today':sameDay(d,new Date(now.getTime()-86400000))?'Yesterday':d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        var dayTotal=groups[date].filter(function(e){return e.type!=='income';}).reduce(function(a,e){return a+e.amount;},0);
        var items=groups[date].map(function(e){
          return '<div class="exp-row">'
            +'<div class="exp-cat-dot" style="background:'+EXP_CAT_COLORS[e.cat]+'"></div>'
            +'<div class="exp-info"><div class="exp-name">'+esc(e.name)+'</div><div class="exp-meta">'+e.cat+(e.note?' · '+esc(e.note):'')+'</div></div>'
            +'<div style="display:flex;align-items:center;gap:8px">'
            +'<div class="exp-amount'+(e.type==='income'?' income':'')+'">'+(e.type==='income'?'+':'-')+fmtMoney(e.amount)+'</div>'
            +'<button class="btn btn-red" data-del-exp="'+e.id+'">✕</button></div></div>';
        }).join('');
        return '<div class="day-group"><div class="day-group-hd"><span class="day-group-date">'+label+'</span>'+(dayTotal>0?'<span class="day-group-total">-'+fmtMoney(dayTotal)+'</span>':'')+'</div>'+items+'</div>';
      }).join('');
      content=daySpendBars+rows;
    }
  } else if(finTab==='breakdown'){
    if(!monthExps.length){
      content='<div class="empty"><div class="empty-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><div class="empty-txt">No spending logged this month yet.</div></div>';
    } else {
      // donut-style: SVG pie arcs approximated with stacked bars
      var totalSpendCats=EXP_CATS.reduce(function(a,c){return a+(catTotals[c]||0);},0)||1;
      content='<div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px">'+MONTHS[curMonth]+' breakdown</div>'
        +'<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">'
        +EXP_CATS.map(function(cat){
          var v=catTotals[cat]||0;if(!v)return '';
          var bud=parseFloat(S.budgets[cat])||0;
          var over=bud>0&&v>bud;
          var w=Math.round(v/maxCat*100);
          var pct2=Math.round(v/totalSpendCats*100);
          return '<div>'
            +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
            +'<div style="display:flex;align-items:center;gap:7px"><div class="exp-cat-dot" style="background:'+EXP_CAT_COLORS[cat]+';width:8px;height:8px"></div>'
            +'<span style="font-size:13px;font-weight:500;color:var(--text)">'+cat+'</span>'
            +(over?'<span style="font-family:var(--mono);font-size:9px;background:rgba(214,62,90,.1);color:var(--red);padding:1px 6px;border-radius:6px">over</span>':'')
            +'</div>'
            +'<div style="display:flex;align-items:center;gap:10px">'
            +'<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">'+pct2+'%</span>'
            +'<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:'+(over?'var(--red)':'var(--text)')+'">'+fmtMoney(v)+'</span>'
            +(bud>0?'<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">/ '+fmtMoney(bud)+'</span>':'')
            +'</div></div>'
            +'<div class="cat-bar-track" style="height:10px;border-radius:8px">'
            +'<div class="cat-bar-fill" style="width:'+w+'%;background:'+EXP_CAT_COLORS[cat]+';height:100%;border-radius:8px;'+(over?'background:var(--red)':'')+'"></div>'
            +'</div></div>';
        }).join('')
        +'</div>';
    }
  } else if(finTab==='trends'){
    var hasData=S.expenses.length>0;
    content=hasData
      ?'<div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">6-month spending vs income</div>'
        +'<div class="chart-wrap" style="margin-bottom:6px">'+trendChart+'</div>'
        +'<div style="display:flex;gap:16px;margin-bottom:20px">'
        +'<div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text3)"><div style="width:20px;height:2px;background:var(--red);border-radius:2px"></div>spending</div>'
        +'<div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text3)"><div style="width:20px;height:2px;background:var(--green);border-radius:2px"></div>income</div>'
        +'</div>'
        +'<div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">monthly savings</div>'
        +'<div class="chart-wrap">'+savingsChart+'</div>'
        +'<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">'
        +'<div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">month summary</div>'
        +'<div style="display:flex;flex-direction:column;gap:6px">'
        +trendLabels.map(function(lbl,i){
          var s=trendSpend[i],inc=trendIncome[i],sv=trendSave[i];
          var isCur=i===5;
          return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:10px;background:'+(isCur?'var(--surface2)':'transparent')+';border:1px solid '+(isCur?'var(--border2)':'transparent')+'">'
            +'<span style="font-family:var(--mono);font-size:11px;font-weight:'+(isCur?'700':'400')+';color:'+(isCur?'var(--text)':'var(--text2)')+'">'+lbl+(isCur?' (now)':'')+'</span>'
            +'<div style="display:flex;gap:14px">'
            +'<span style="font-family:var(--mono);font-size:11px;color:var(--red)">-'+fmtMoneyShort(s)+'</span>'
            +(inc>0?'<span style="font-family:var(--mono);font-size:11px;color:var(--green)">+'+fmtMoneyShort(inc)+'</span>':'')
            +(sv>0?'<span style="font-family:var(--mono);font-size:11px;color:var(--teal)">💾'+fmtMoneyShort(sv)+'</span>':'')
            +'</div></div>';
        }).join('')
        +'</div></div>'
      :'<div class="empty"><div class="empty-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div class="empty-txt">Add transactions to see your spending trends.</div></div>';
  } else if(finTab==='budget'){
    content='<div>'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
      +'<div><div class="ctitle">Monthly Budget</div><div class="csub">set spending limits per category</div></div>'
      +'<button class="btn btn-primary" id="save-budgets">save</button>'
      +'</div>'
      +'<div style="margin-bottom:14px;padding:12px;background:var(--surface2);border-radius:12px;border:1px solid var(--border)">'
      +'<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase">monthly take-home income</div>'
      +'<input type="text" id="fin-income" placeholder="e.g. 4500" value="'+esc(String(S.monthlyIncome||''))+'" style="max-width:200px;height:36px"/>'
      +(totalBudget>0?'<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:6px">Total budget: '+fmtMoney(totalBudget)+(monthIncome>0?' · '+Math.round(totalBudget/monthIncome*100)+'% of income':'')+'</div>':'')
      +'</div>'
      +EXP_CATS.map(function(cat){
        var spent=catTotals[cat]||0,bud=parseFloat(S.budgets[cat])||0,over=bud>0&&spent>bud;
        var fillW=bud>0?Math.min(100,Math.round(spent/bud*100)):0;
        return '<div class="budget-row" style="flex-direction:column;align-items:stretch;gap:8px">'
          +'<div style="display:flex;align-items:center;justify-content:space-between">'
          +'<div style="display:flex;align-items:center;gap:8px"><div class="exp-cat-dot" style="background:'+EXP_CAT_COLORS[cat]+'"></div><div class="budget-name">'+cat+'</div></div>'
          +'<div class="budget-right">'
          +(bud>0?'<div class="budget-pct" style="color:'+(over?'var(--red)':'var(--green)')+'">'+Math.round(spent/bud*100)+'%</div>':'')
          +'<input type="text" data-bcat="'+cat+'" placeholder="budget" value="'+esc(String(S.budgets[cat]||''))+'" style="width:80px;height:32px;text-align:right"/>'
          +'</div></div>'
          +(bud>0?'<div><div class="cat-bar-track" style="height:6px"><div class="cat-bar-fill" style="width:'+fillW+'%;background:'+(over?'var(--red)':EXP_CAT_COLORS[cat])+'"></div></div>'
            +'<div style="display:flex;justify-content:space-between;margin-top:3px"><span style="font-family:var(--mono);font-size:9px;color:var(--text3)">'+fmtMoney(spent)+' spent</span><span style="font-family:var(--mono);font-size:9px;color:'+(over?'var(--red)':'var(--text3)')+'">'+fmtMoney(bud)+' limit</span></div></div>':'')
          +'</div>';
      }).join('')
      +'</div>';
  } else if(finTab==='insights'){
    var insights=[];
    var dayOfMonth=now.getDate();
    if(monthSpend>0&&totalBudget>0){
      var pctUsed=monthSpend/totalBudget;
      if(pctUsed>expectedPct+0.1) insights.push({icon:'⚠️',col:'var(--red)',label:'Spending ahead of pace',txt:'You\'ve used '+Math.round(pctUsed*100)+'% of your budget but only '+Math.round(expectedPct*100)+'% of the month has passed. At this pace you\'ll exceed your budget by '+fmtMoney(monthSpend/dayOfMonth*daysInMonth2-totalBudget)+'.'});
      else if(pctUsed<expectedPct-0.1) insights.push({icon:'✅',col:'var(--green)',label:'On track this month',txt:'You\'ve used '+Math.round(pctUsed*100)+'% of your budget with '+Math.round(expectedPct*100)+'% of the month elapsed. Projected monthly spend: '+fmtMoney(monthSpend/dayOfMonth*daysInMonth2)+'.'});
    }
    // savings rate insight
    if(monthIncome>0){
      var sr=Math.round(Math.max(0,net)/monthIncome*100);
      if(sr>=20) insights.push({icon:'🏆',col:'var(--green)',label:'Excellent savings rate: '+sr+'%',txt:'Saving over 20% of income is a strong financial habit. At this rate you\'re on track to save '+fmtMoney(net*12)+' annualized.'});
      else if(sr>0&&sr<10) insights.push({icon:'💡',col:'var(--gold)',label:'Savings rate: '+sr+'%',txt:'Financial experts recommend saving 20%+ of income. You\'re saving '+fmtMoney(net)+' this month. Consider reducing your top spending category to boost this.'});
      else if(sr<=0&&monthIncome>0) insights.push({icon:'🔴',col:'var(--red)',label:'Spending more than earning',txt:'You\'re '+fmtMoney(Math.abs(net))+' in the red this month. Review your biggest categories and set budget limits to get back on track.'});
    }
    // top category
    var topCat=EXP_CATS.reduce(function(a,c){return (catTotals[c]||0)>(catTotals[a]||0)?c:a;},'Other');
    if(catTotals[topCat]>0) insights.push({icon:'bar-chart',col:EXP_CAT_COLORS[topCat],label:'Biggest spend: '+topCat+' ('+Math.round(catTotals[topCat]/Math.max(monthSpend,1)*100)+'%)',txt:topCat+' is your top category at '+fmtMoney(catTotals[topCat])+' this month.'+(parseFloat(S.budgets[topCat])>0?' Budget: '+fmtMoney(parseFloat(S.budgets[topCat]))+'.':'  Consider setting a budget limit.')});
    // over-budget categories
    EXP_CATS.forEach(function(cat){
      var spent=catTotals[cat]||0,bud=parseFloat(S.budgets[cat])||0;
      if(bud>0&&spent>bud) insights.push({icon:'🚨',col:'var(--red)',label:cat+' over budget by '+fmtMoney(spent-bud),txt:'You\'ve spent '+fmtMoney(spent)+' on '+cat+' vs your '+fmtMoney(bud)+' limit. That\'s '+Math.round(spent/bud*100)+'% of budget used.'});
    });
    // trend: compare to last month
    var prevMonthSpend=trendSpend[4];
    if(prevMonthSpend>0&&monthSpend>0){
      var diff=monthSpend-prevMonthSpend;var diffPct=Math.round(Math.abs(diff)/prevMonthSpend*100);
      if(diff>0) insights.push({icon:'trending-up',col:'var(--red)',label:'Up '+diffPct+'% vs last month',txt:'Spending '+fmtMoney(diff)+' more than '+trendLabels[4]+'. Review recent transactions to identify what changed.'});
      else if(diff<0) insights.push({icon:'📉',col:'var(--green)',label:'Down '+diffPct+'% vs last month',txt:'Great — spending '+fmtMoney(Math.abs(diff))+' less than '+trendLabels[4]+'. Keep it up!'});
    }

    +'<div class="import-method" id="import-csv-btn"><div class="import-method-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div><div><div class="import-method-title">CSV / OFX</div><div class="import-method-sub">Upload your bank export</div></div></div>'

function bindContent(){
  document.querySelectorAll('#content [data-tab]').forEach(function(btn){btn.addEventListener('click',function(){setTab(btn.getAttribute('data-tab'));});});
  // finance tab switcher
  document.querySelectorAll('[data-fin-tab]').forEach(function(btn){btn.addEventListener('click',function(){S.finTab=btn.getAttribute('data-fin-tab');saveState();renderTab();});});
  // import methods
  bindImport();
  // Apple Health manual save
  var hSaveBtn=document.getElementById('h-save-btn');
  if(hSaveBtn){hSaveBtn.addEventListener('click',function(){
    var burned=parseInt(document.getElementById('h-burned').value)||0;
    var steps=parseInt(document.getElementById('h-steps').value)||0;
    var active=parseInt(document.getElementById('h-active').value)||0;
    var dk=dateKey(selDate);
    if(!S.healthByDate) S.healthByDate={};
    S.healthByDate[dk]={burned:burned,steps:steps,activeMin:active,source:'manual – '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})};
    saveState();showToast('Health data saved ✓');renderTab();
  });}
  // Strava connect
  var stravaConnBtn=document.getElementById('strava-connect-btn');
  if(stravaConnBtn){stravaConnBtn.addEventListener('click',function(){
    var clientId=window.__STRAVA_CLIENT_ID__||'';
    if(!clientId){showToast('Set STRAVA_CLIENT_ID in Vercel env vars');return;}
    var redirect=window.location.origin+window.location.pathname;
    var url='https://www.strava.com/oauth/authorize?client_id='+clientId+'&redirect_uri='+encodeURIComponent(redirect)+'&response_type=code&approval_prompt=auto&scope=activity:read_all';
    window.location.href=url;
  });}
  // Strava sync now
  var stravaSyncBtn=document.getElementById('strava-sync-btn');
  if(stravaSyncBtn){stravaSyncBtn.addEventListener('click',function(){stravaSync(true);});}
  // Strava disconnect
  var stravaDisBtn=document.getElementById('strava-disconnect-btn');
  if(stravaDisBtn){stravaDisBtn.addEventListener('click',function(){
    S.strava=null;saveState();showToast('Strava disconnected');renderTab();
  });}
  
  // delete expense
  document.querySelectorAll('[data-del-exp]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();S.expenses=S.expenses.filter(function(x){return x.id!==parseInt(btn.getAttribute('data-del-exp'));});saveState();showToast('transaction removed');renderTab();});});
  // open add expense
  var openExp=document.getElementById('open-exp');
  if(openExp)openExp.addEventListener('click',function(){document.getElementById('exp-overlay').style.display='flex';renderExpModal();});
  // save budgets
  var saveBudgets=document.getElementById('save-budgets');
  if(saveBudgets)saveBudgets.addEventListener('click',function(){
    EXP_CATS.forEach(function(cat){var el=document.querySelector('[data-bcat="'+cat+'"]');if(el)S.budgets[cat]=parseFloat(el.value)||0;});
    var incEl=document.getElementById('fin-income');if(incEl)S.monthlyIncome=parseFloat(incEl.value)||0;
    saveState();showToast('budget saved');renderTab();
  });
  document.querySelectorAll('[data-gid]').forEach(function(el){
    el.addEventListener('click',function(){
      var id=parseInt(el.getAttribute('data-gid'));
      var dk=dateKey(selDate);
      if(!S.goalsByDate[dk]) S.goalsByDate[dk]=[];
      S.goalsByDate[dk]=S.goalsByDate[dk].map(function(g){return g.id===id?Object.assign({},g,{done:!g.done}):g;});
      if(S.goalsByDate[dk].find(function(g){return g.id===id&&g.done;})) showToast('✓ goal complete');
      saveState();renderTab();
    });
  });
  document.querySelectorAll('[data-del-goal]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var dk=dateKey(selDate);if(S.goalsByDate[dk])S.goalsByDate[dk]=S.goalsByDate[dk].filter(function(g){return g.id!==parseInt(btn.getAttribute('data-del-goal'));});saveState();showToast('goal removed');renderTab();});});
  document.querySelectorAll('[data-del-meal]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();S.meals=S.meals.filter(function(m){return m.id!==parseInt(btn.getAttribute('data-del-meal'));});saveState();showToast('meal removed');renderTab();});});
  document.querySelectorAll('[data-del-session]').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var dk=dateKey(selDate);if(S.sessionsByDate[dk])S.sessionsByDate[dk]=S.sessionsByDate[dk].filter(function(s){return s.id!==parseInt(btn.getAttribute('data-del-session'));});saveState();showToast('session removed');renderTab();});});
  document.querySelectorAll('[data-rating]').forEach(function(s){s.addEventListener('click',function(){S.nj.rating=parseInt(s.getAttribute('data-rating'));saveState();renderTab();});});
  var mjSave=document.getElementById('mj-save')||document.getElementById('dash-mj-save');
  if(mjSave) mjSave.addEventListener('click',function(){
    var i=document.getElementById('mj-int')||document.getElementById('dash-intention'),g=document.getElementById('mj-grat'),p=document.getElementById('mj-pri');
    if(i)S.mj.intention=i.value;if(g)S.mj.gratitude=g.value;if(p)S.mj.priorities=p.value;
    S.mj.savedAt=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    saveState();showToast('morning journal saved');renderTab();
  });
  var njSave=document.getElementById('nj-save');
  if(njSave) njSave.addEventListener('click',function(){
    var w=document.getElementById('nj-well'),b=document.getElementById('nj-bet'),l=document.getElementById('nj-learn');
    if(w)S.nj.wentWell=w.value;if(b)S.nj.better=b.value;if(l)S.nj.learned=l.value;
    S.nj.savedAt=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    saveState();showToast('reflection saved');renderTab();
  });
  var agBtn=document.getElementById('add-goal-btn'),agInput=document.getElementById('new-goal-txt');
  function doAddGoal(){
    if(!agInput||!agInput.value.trim())return;
    var sel=document.getElementById('new-goal-tag');
    var dk=dateKey(selDate);
    if(!S.goalsByDate) S.goalsByDate={};
    if(!S.goalsByDate[dk]) S.goalsByDate[dk]=[];
    S.goalsByDate[dk].push({id:Date.now(),text:agInput.value.trim(),done:false,tag:sel?sel.value:'Personal'});
    agInput.value='';
    saveState();showToast('goal added');renderTab();
  }
  if(agBtn)agBtn.addEventListener('click',doAddGoal);
  if(agInput)agInput.addEventListener('keydown',function(e){if(e.key==='Enter')doAddGoal();});
  var scanBtn=document.getElementById('open-scan');
  if(scanBtn)scanBtn.addEventListener('click',function(){scanStep=0;scanImageBase64=null;document.getElementById('scan-overlay').style.display='flex';renderScan();});
  var addMealBtn=document.getElementById('open-add-meal');
  if(addMealBtn)addMealBtn.addEventListener('click',function(){document.getElementById('meal-overlay').style.display='flex';renderMealModal();});
  var toggleAdd=document.getElementById('toggle-add');
  if(toggleAdd)toggleAdd.addEventListener('click',function(){S.showAddSession=!S.showAddSession;renderTab();});
  var incStreak=document.getElementById('inc-streak');
  if(incStreak)incStreak.addEventListener('click',function(){S.streak++;document.getElementById('tb-streak').textContent=S.streak;saveState();renderTab();});
  document.querySelectorAll('[data-stype]').forEach(function(btn){btn.addEventListener('click',function(){S.sessionType=btn.getAttribute('data-stype');renderTab();});});
  document.querySelectorAll('[data-sid]').forEach(function(btn){btn.addEventListener('click',function(){var id=parseInt(btn.getAttribute('data-sid'));var dk=dateKey(selDate);if(S.sessionsByDate[dk])S.sessionsByDate[dk]=S.sessionsByDate[dk].map(function(s){return s.id===id?Object.assign({},s,{showed:!s.showed}):s;});saveState();renderTab();});});
  var logBtn=document.getElementById('log-btn');
  if(logBtn)logBtn.addEventListener('click',function(){
    var n=document.getElementById('s-name'),d=document.getElementById('s-dur'),nt=document.getElementById('s-notes');
    if(!n||!n.value.trim())return showToast('enter a session name');
    var dk=dateKey(selDate);
    if(!S.sessionsByDate) S.sessionsByDate={};
    if(!S.sessionsByDate[dk]) S.sessionsByDate[dk]=[];
    S.sessionsByDate[dk].unshift({id:Date.now(),type:S.sessionType,name:n.value.trim(),duration:d?d.value.trim():'',notes:nt?nt.value.trim():'',showed:true,date:dk});
    if(sameDay(selDate,today)){S.streak++;document.getElementById('tb-streak').textContent=S.streak;}
    S.showAddSession=false;saveState();showToast('session logged 💪');renderTab();
  });
}

  var catBtns=['Breakfast','Lunch','Dinner','Snack'].map(function(c){return '<button class="mcat-btn '+(addMealCat===c?'on':'off')+'" data-mcat="'+c+'">'+c+'</button>';}).join('');
  el.innerHTML='<div class="modal-title">add food</div>'
    +'<div class="modal-sub">log a meal or snack to your tracker</div>'
    +'<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase">category</div>'
    +'<div class="meal-cat-btns">'+catBtns+'</div>'
    +'<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:5px;margin-top:10px;letter-spacing:.5px;text-transform:uppercase">food name</div>'

    +'<div><div style="font-family:var(--mono);font-size:9px;color:#2a6af0;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">protein</div><input type="text" id="m-p" placeholder="0g" style="height:34px"/></div>'
    +'<div><div style="font-family:var(--mono);font-size:9px;color:#c47d0a;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">carbs</div><input type="text" id="m-c" placeholder="0g" style="height:34px"/></div>'
    +'<div><div style="font-family:var(--mono);font-size:9px;color:#d94060;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">fat</div><input type="text" id="m-f" placeholder="0g" style="height:34px"/></div>'
    +'</div>'
    +'<button class="mbtn grn" id="m-add">add to log</button>'
    +'<button class="mcancel" id="m-cancel">cancel</button>';
  document.querySelectorAll('[data-mcat]').forEach(function(btn){btn.addEventListener('click',function(){addMealCat=btn.getAttribute('data-mcat');renderMealModal();});});
  document.getElementById('m-add').addEventListener('click',function(){
    var n=document.getElementById('m-name');if(!n||!n.value.trim())return showToast('enter a food name');
    S.meals.push({id:Date.now(),name:n.value.trim(),meal:addMealCat,cal:parseInt(document.getElementById('m-cal').value)||0,p:parseInt(document.getElementById('m-p').value)||0,c:parseInt(document.getElementById('m-c').value)||0,f:parseInt(document.getElementById('m-f').value)||0});
    saveState();document.getElementById('meal-overlay').style.display='none';showToast('meal added');
    if(activeTab==='nutrition'||activeTab==='dashboard')renderTab();
  });
  document.getElementById('m-cancel').addEventListener('click',function(){document.getElementById('meal-overlay').style.display='none';});
}

function renderScan(){
  var el=document.getElementById('scan-modal');
  if(scanStep===0){
    var catBtns=['Breakfast','Lunch','Dinner','Snack'].map(function(c){return '<button class="mcat-btn '+(scanMealCat===c?'on':'off')+'" data-scancat="'+c+'">'+c+'</button>';}).join('');
    el.innerHTML='<div class="modal-title">AI food scan</div>'
      +'<div class="modal-sub">upload a photo &mdash; AI detects items and estimates macros</div>'
      +'<div style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase">meal category</div>'
      +'<div class="meal-cat-btns">'+catBtns+'</div>'
      +'<div id="sc-drop" style="border:1px dashed var(--border2);border-radius:5px;padding:28px;text-align:center;cursor:pointer;margin:12px 0;transition:all .2s;background:var(--surface2)">'
      +'<div style="font-size:22px;margin-bottom:6px;opacity:.25">&#9670;</div>'
      +'<div style="font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.3px">click or drag image here</div>'
      +'</div>'
      +'<input type="file" id="sc-file" accept="image/*" style="display:none"/>'
      +'<div id="sc-preview" style="display:none;margin-bottom:10px">'
      +'<img id="sc-img" style="width:100%;max-height:130px;border-radius:5px;object-fit:cover"/>'
      +'<div id="sc-img-label" style="font-family:var(--mono);font-size:10px;color:var(--green);margin-top:5px;letter-spacing:.3px"></div>'
      +'</div>'
      +'<button class="mbtn prim" id="sc-analyze" disabled style="opacity:.4">analyze image</button>'
      +'<button class="mcancel" id="sc-cancel">cancel</button>';
    document.querySelectorAll('[data-scancat]').forEach(function(btn){btn.addEventListener('click',function(){scanMealCat=btn.getAttribute('data-scancat');renderScan();});});
    var drop=document.getElementById('sc-drop'),fileInput=document.getElementById('sc-file');
    drop.addEventListener('click',function(){fileInput.click();});
    drop.addEventListener('dragover',function(e){e.preventDefault();drop.style.borderColor='var(--accent)';});
    drop.addEventListener('dragleave',function(){drop.style.borderColor='var(--border2)';});
    drop.addEventListener('drop',function(e){e.preventDefault();drop.style.borderColor='var(--border2)';if(e.dataTransfer.files[0])handleImageFile(e.dataTransfer.files[0]);});
    fileInput.addEventListener('change',function(){if(fileInput.files[0])handleImageFile(fileInput.files[0]);});
    document.getElementById('sc-analyze').addEventListener('click',doAIScan);

function guessCategory(name){
  var n=(name||'').toLowerCase();
  if(/rent|mortgage|electric|gas bill|utility|water bill|internet|comcast|xfinity|at&t|verizon/.test(n)) return 'Housing';
  if(/grocery|grocer|whole foods|trader joe|safeway|kroger|walmart|target|costco|aldi|publix|restaurant|cafe|coffee|starbucks|mcdonalds|chipotle|doordash|uber eats|grubhub|pizza|sushi|burger|taco|diner|deli|bakery|food/.test(n)) return 'Food';
  if(/uber|lyft|taxi|parking|mta|metro|bart|caltrain|amtrak|delta|united|southwest|airline|gas station|chevron|shell|exxon|bp|76/.test(n)) return 'Transport';
  if(/amazon|ebay|etsy|walmart|target|bestbuy|apple store|nike|zara|h&m|nordstrom|macys|gap|old navy|shop|store|retail/.test(n)) return 'Shopping';
  if(/cvs|walgreens|pharmacy|doctor|hospital|clinic|dental|optometrist|gym|planet fitness|24 hour|yoga|health/.test(n)) return 'Health';
  if(/netflix|spotify|hulu|disney|hbo|apple tv|youtube|steam|playstation|xbox|movie|theater|concert|ticketmaster|amc/.test(n)) return 'Entertainment';
  if(/payroll|salary|direct dep|income|refund|zelle|venmo|cashapp|transfer in/.test(n)) return 'income';
  return 'Other';
}

function parseCsvTransactions(text,filename){
  var lines=text.trim().split('\n').map(function(l){return l.trim();}).filter(Boolean);
  if(lines.length<2) return [];
  // detect header row
  var header=lines[0].toLowerCase().replace(/"/g,'');
  var cols=header.split(',');
  // find column indexes for common bank CSV formats
  // Chase: Transaction Date, Post Date, Description, Category, Type, Amount, Memo
  // BofA: Posted Date, Reference Number, Payee, Address, Amount
  // Wells Fargo: Date, Amount, *, *, Description
  // Capital One: Transaction Date, Posted Date, Card No., Description, Category, Debit, Credit
  var dateIdx=-1,descIdx=-1,amtIdx=-1,creditIdx=-1,debitIdx=-1;
  cols.forEach(function(c,i){
    if(/date/.test(c)&&dateIdx===-1) dateIdx=i;
    if(/description|payee|memo|name/.test(c)) descIdx=i;
    if(/^amount$|^amt$/.test(c.trim())) amtIdx=i;
    if(/credit/.test(c)) creditIdx=i;
    if(/debit/.test(c)) debitIdx=i;
  });
  if(descIdx===-1) descIdx=cols.findIndex(function(c){return c.length>2;});
  var results=[];
  for(var i=1;i<lines.length;i++){
    var parts=lines[i].match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)||lines[i].split(',');
    parts=parts.map(function(p){return p.replace(/^"|"$/g,'').trim();});
    var rawDate=dateIdx>=0?parts[dateIdx]:'';
    var desc=descIdx>=0?(parts[descIdx]||''):'';
    var amount=0,isIncome=false;
    if(amtIdx>=0){
      var raw=parseFloat(parts[amtIdx])||0;
      // Chase: negative = debit, positive = credit
      // BofA: negative = debit
      isIncome=raw>0;
      amount=Math.abs(raw);
    } else if(creditIdx>=0||debitIdx>=0){
      var cr=parseFloat(parts[creditIdx])||0;
      var dr=parseFloat(parts[debitIdx])||0;
      if(cr>0){isIncome=true;amount=cr;}
      else{amount=dr;}
    }
    if(!desc||amount===0) continue;
    // normalize date to YYYY-MM-DD
    var d=new Date(rawDate);
    var dateStr=isNaN(d)?new Date().toISOString().split('T')[0]:d.toISOString().split('T')[0];
    var cat=guessCategory(desc);
    results.push({id:Date.now()+i,name:desc,type:isIncome?'income':'expense',cat:isIncome?'Other':cat,amount:amount,date:dateStr,note:'CSV import'});
  }
  return results;
}

        +txs.map(function(t){
          return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">'
            +'<div style="display:flex;gap:8px;align-items:center;min-width:0"><div class="exp-cat-dot" style="background:'+EXP_CAT_COLORS[t.cat]+';flex-shrink:0"></div>'
            +'<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px"><div style="color:var(--text)">'+esc(t.name)+'</div><div style="font-family:var(--mono);font-size:9px;color:var(--text3)">'+t.date+'</div></div></div>'
            +'<span style="font-family:var(--mono);font-weight:700;color:'+(t.type==='income'?'var(--green)':'var(--text)')+';flex-shrink:0;margin-left:8px">'+(t.type==='income'?'+':'-')+fmtMoney(t.amount)+'</span></div>';
        }).join('')
        +'<button class="mbtn grn" id="email-confirm-btn" style="margin-top:10px">add '+txs.length+' transaction'+(txs.length!==1?'s':'')+' to log</button>';
      document.getElementById('email-confirm-btn').addEventListener('click',function(){
        txs.forEach(function(t){S.expenses.unshift(t);});
        S.lastImport=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
        saveState();document.getElementById('email-overlay').style.display='none';
        showToast('✓ '+txs.length+' transaction'+(txs.length!==1?'s':'')+' imported');
        if(activeTab==='finance'||activeTab==='dashboard')renderTab();
      });
    })
    .catch(function(err){btn.disabled=false;btn.textContent='🤖 parse with AI';showToast('Error: '+(err.message||'try again'));});
  });
}

function fetchTellerTransactions(accessToken) {
  showToast('Syncing transactions…');
  fetch('/api/teller-transactions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ access_token: accessToken }),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) { showToast('Teller error: ' + data.error); return; }
    var txs = data.transactions || [];
    var existing = new Set((S.expenses || []).map(function(e) { return e.tellerId; }).filter(Boolean));
    var news = txs.filter(function(t) { return t.tellerId && !existing.has(t.tellerId); });
    // Also include transactions without a tellerId that don't match by date+amount+name
    var newsCount = 0;
    news.forEach(function(t) { S.expenses.push(t); newsCount++; });
    if (newsCount === 0) { showToast('No new transactions found'); }
    else {
      S.lastImport = new Date().toLocaleDateString();
      saveState();
      showToast('✓ ' + newsCount + ' new transaction' + (newsCount !== 1 ? 's' : '') + ' imported');
      renderTab();
    }
  })
  .catch(function(err) { showToast('Connection error: ' + err.message); });
}

function bindImport(){
  var bankBtn=document.getElementById('import-bank-btn');
  var csvBtn=document.getElementById('import-csv-btn');
  var emailBtn=document.getElementById('import-email-btn');
  var manualBtn=document.getElementById('import-manual-btn');
  if(bankBtn) bankBtn.addEventListener('click',function(){
    if(typeof TellerConnect === 'undefined') {
      showToast('Teller Connect failed to load. Check your connection.');
      return;
    }
    var appId = (window.TELLER_APP_ID || '');
    if(!appId) {
      showToast('TELLER_APP_ID not configured — see setup instructions.');
      return;
    }
    var tc = TellerConnect.setup({
      applicationId: appId,
      environment: (window.TELLER_ENV || 'sandbox'),
      products: ['transactions'],
      onSuccess: function(enrollment) {
        fetchTellerTransactions(enrollment.accessToken);
      },
      onExit: function() {},
      onFailure: function(failure) {
        showToast('Bank connection failed: ' + (failure.message || 'unknown error'));
      },
    });
    tc.open();
  });
  if(csvBtn) csvBtn.addEventListener('click',function(){document.getElementById('csv-overlay').style.display='flex';renderCsvModal();});
  var testDataBtn=document.getElementById('import-testdata-btn');
  if(testDataBtn) testDataBtn.addEventListener('click', loadSandboxTestData);
  if(emailBtn) emailBtn.addEventListener('click',function(){document.getElementById('email-overlay').style.display='flex';renderEmailModal();});
  if(manualBtn) manualBtn.addEventListener('click',function(){document.getElementById('exp-overlay').style.display='flex';renderExpModal();});
}

init();
</script>
